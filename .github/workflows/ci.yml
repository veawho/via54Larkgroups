name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Verify no unexpected URLs in source
        run: |
          if grep -rn "https://" src/ | grep -v "feishu.cn"; then
            echo "ERROR: Unexpected URLs found in source code"
            exit 1
          fi
          echo "OK: Only feishu.cn URLs in source"

      - name: Verify no write scopes in source
        run: |
          if grep -rn "im:message:send\|im:message:[^r]" src/; then
            echo "ERROR: Non-readonly im:message scopes found"
            exit 1
          fi
          echo "OK: Only readonly scopes in source"

      - name: Run tests with coverage
        run: |
          pytest --cov=via54_larkgroups --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false